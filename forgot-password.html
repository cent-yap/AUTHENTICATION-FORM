<!DOCTYPE html>
<html lang="en" dir="ltr" translate="no">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, 
                viewport-fit=cover, interactive-widget=resizes-content"/>
    <meta name="color-scheme" content="only light"/>
    <meta name="theme-color" content="#f8f9fa"/>
    <meta name="referrer" content="strict-origin-when-cross-origin"/>
    <meta name="description" content="Reset your password."/>
    <!-- PWA -->
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
    <link rel="icon" type="image/png" href="/img/trademark.png"/>
    <title>Forgot Password Form</title>
    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/pages/forgot-password.ts"></script>
  </head>
  <body>

  <!--Main Section-->
  <main>

    <!--First Section-->
    <section>
      <div class="control">
        <div class="container">
          <div class="content">
            <div class="wrap">
              <form class="contact" autocomplete="on" aria-labelledby="forgot-password-heading" aria-describedby="forgot-password-description" novalidate>
                <div class="info">
                  <header>
                    <h1 id="forgot-password-heading">Happens to everyone.</h1>
                    <p id="forgot-password-description">No worries, enter your email and we'll send you a reset link.</p>
                  </header>

                  <div class="click">
                    <label for="email">Email <small class="vital" aria-hidden="true">*</small></label>
                    <input type="email" id="email" name="email" placeholder=" " autocomplete="email"
                          aria-describedby="email-error email-success" required>
                    <small id="email-error" class="error" aria-live="polite">Invalid email address.</small>
                    <small id="email-success" class="success" aria-live="polite">That email works.</small>
                  </div>

                  <div class="click">
                    <button type="submit">Reset password</button>
                  </div>

                  <div class="login">
                    <span aria-hidden="true">Remembered it?</span>
                    <a href="index.html">Head back.</a>
                  </div>
                </div>
              </form>
            </div>

            <div class="wrap">
              <div class="here">
                <div class="slide"></div>
                <div class="slide"></div>
                <div class="slide"></div>
                <div class="slide"></div>
                <div class="slide"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
   
  </body>
</html>
