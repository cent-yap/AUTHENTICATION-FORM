<!DOCTYPE html>
<html lang="en" dir="ltr" translate="no">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, 
                viewport-fit=cover, interactive-widget=resizes-content"/>
    <meta name="color-scheme" content="only light"/>
    <meta name="theme-color" content="#f8f9fa"/>
    <meta name="referrer" content="strict-origin-when-cross-origin"/>
    <meta name="description" content="Log in to your account."/>
    <!-- PWA -->
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
    <link rel="icon" type="image/png" href="/img/trademark.png"/>
    <title>Log In Form</title>
    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/pages/log-in.ts"></script>
  </head>
  <body>

  <!--Main Section-->
  <main>

    <!--First Section-->
    <section>
      <div class="control">
        <div class="container">
          <div class="content">
            <div class="wrap">
              <form class="contact" autocomplete="on" aria-labelledby="login-heading" aria-describedby="login-description" novalidate>
                <div class="info">
                  <header>
                    <h1 id="login-heading">Hey, you're back!</h1>
                    <p id="login-description">Enter your details and let's get you back in.</p>
                  </header>

                  <div class="click">
                    <label for="email">Email <small class="vital" aria-hidden="true">*</small></label>
                    <input type="email" id="email" name="email" placeholder=" " autocomplete="email" 
                           aria-describedby="email-error email-success" required>
                    <small id="email-error" class="error" aria-live="polite">Invalid email address.</small>
                    <small id="email-success" class="success" aria-live="polite">That email works.</small>
                  </div>

                  <div class="click">
                    <label for="password">Password <small class="vital" aria-hidden="true">*</small></label>
                    <a href="forgot-password.html" id="forget">Forgot password?</a>
                    <input type="password" id="password" name="password" minlength="8" placeholder=" " autocomplete="current-password"
                           pattern="^(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[\W_])[A-Za-z\d\W_]{8,}$"
                           aria-describedby="password-hint password-error password-success" required>
                    <small id="password-hint" class="clue">8+ chars · A-z · 0-9 · !@#$</small>
                    <small id="password-error" class="error" aria-live="polite">Password doesn't meet requirements.</small>
                    <small id="password-success" class="success" aria-live="polite">Password accepted.</small>
                  </div>

                  <div class="save">
                    <label for="remember">
                      <input type="checkbox" id="remember" name="remember">
                      Remember me
                    </label>
                    <label for="show">
                      <input type="checkbox" id="show" name="show" aria-label="Show password">
                    </label>
                  </div>

                  <div class="click">
                    <button type="submit">Let's go</button>
                  </div>

                  <div class="register">
                    <span aria-hidden="true">First time?</span>
                    <a href="create-account.html">Join us.</a>
                  </div>
                </div>
              </form>
            </div>

            <div class="wrap">
              <div class="here">
                <div class="slide"></div>
                <div class="slide"></div>
                <div class="slide"></div>
                <div class="slide"></div>
                <div class="slide"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
   
  </body>
</html>
